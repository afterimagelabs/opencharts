    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Is OpenCharts a law firm? Is this legal advice?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. OpenCharts is a public-interest project, not a law firm, and nothing on this site is legal advice. The HIPAA Privacy Rule is federal law that applies on its own. We just help you exercise the access right it already grants you. For your specific situation, talk to an attorney."
          }
        },
        {
          "@type": "Question",
          "name": "Does this work outside the United States?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The 30-day deadline is a U.S. federal rule (45 CFR § 164.524). Most other countries have their own access laws: Canada (PIPEDA), the UK and EU (GDPR Article 15), Australia (Privacy Act). The deadlines and the complaint processes are different."
          }
        },
        {
          "@type": "Question",
          "name": "What if my provider says they need more than 30 days?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "They can extend once, by up to 30 days, but only if they tell you in writing within the first 30 days and explain the delay. A verbal 'we need more time' doesn't qualify. If you got no written notice and Day 30 passed, the extension didn't happen."
          }
        },
        {
          "@type": "Question",
          "name": "Can my provider charge me for the records?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "They can charge a reasonable, cost-based fee. That covers labor for copying, postage, and the cost of the storage media. It does not cover searching or retrieving the records, and a per-page fee can't exceed actual cost. HHS published the specific limits in its 2016 guidance."
          }
        },
        {
          "@type": "Question",
          "name": "What format am I entitled to receive my records in?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "If the records are kept electronically, you have the right to receive them in an electronic form and format of your choice, as long as that format is readily producible. The provider can't force you to take paper if a usable PDF or download is available."
          }
        },
        {
          "@type": "Question",
          "name": "How fast does OCR actually act on a complaint?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Slowly, usually. OCR's published complaint process can take many months to resolve, and most complaints are closed without a formal enforcement action. That does not mean filing is pointless. A filed complaint creates a record, signals a pattern when paired with others, and is sometimes enough on its own to make a provider move."
          }
        },
        {
          "@type": "Question",
          "name": "Could my provider drop me as a patient for sending this letter?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Providers can generally end the patient relationship, but they have to do it cleanly: with notice, with referrals, and without abandoning you mid-treatment. Filing a HIPAA records request is exercising a federal right, and retaliation specifically for exercising that right is itself a HIPAA violation under 45 CFR § 164.530(g)."
          }
        }
      ]
    }
    </script>
